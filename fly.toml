app = "wapp-quote"
primary_region = "sin"
kill_signal = "SIGTERM"
kill_timeout = 30
swap_size_mb = 256

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "node dist/src/cli.js serve"

[env]
  AUTH_METHOD = "qr"
  RESET_AUTH_ON_START = "false"
  QUOTE_SOURCE = "wikiquote"
  WIKIQUOTE_LANGUAGE = "hi"
  WIKIQUOTE_MODE = "pages"
  TZ = "Asia/Kolkata"
  QUOTE_TIME = "06:00"
  AI_PROVIDER = "ollama-cloud"
  OLLAMA_BASE_URL = "https://ollama.com/api"
  OLLAMA_MODEL = "gpt-oss:120b"
  AI_TIMEOUT_MS = "10000"
  AI_TEMPERATURE = "0.7"
  LOG_LEVEL = "info"

[mounts]
  source = "wapp_quote_data"
  destination = "/app/data"
  initial_size = "1gb"
  snapshot_retention = 7

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[restart]]
  policy = "always"
  retries = 10
