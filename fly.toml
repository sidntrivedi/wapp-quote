app = "wapp-quote"
primary_region = "sin"
kill_signal = "SIGTERM"
kill_timeout = 30
swap_size_mb = 256

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "node dist/src/cli.js serve"

[env]
  AUTH_METHOD = "qr"
  RESET_AUTH_ON_START = "false"
  QUOTE_SOURCE = "wikiquote"
  WIKIQUOTE_LANGUAGE = "hi"
  WIKIQUOTE_MODE = "pages"
  TZ = "Asia/Kolkata"
  QUOTE_TIME = "06:00"
  AI_PROVIDER = "openai"
  OPENAI_MODEL = "gpt-4o-mini"
  AI_TIMEOUT_MS = "10000"
  AI_TEMPERATURE = "0.7"
  LOG_LEVEL = "info"
  QUOTE_CATCH_UP = "true"
  HEALTH_WEBHOOK_ENABLED = "true"
  HEALTH_WEBHOOK_PORT = "8080"
  HEALTH_STEP_GOAL = "8000"

# HTTP service for the Apple Shortcuts health webhook. auto_stop is disabled so
# the single long-lived WhatsApp (Baileys) session in the serve process is never
# killed between requests.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

[mounts]
  source = "wapp_quote_data"
  destination = "/app/data"
  initial_size = "1gb"
  snapshot_retention = 7

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[restart]]
  policy = "always"
  retries = 10
